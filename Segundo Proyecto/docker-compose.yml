services:
  neo4j:
    image: neo4j:5.20-community
    container_name: movies_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP / Neo4j Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/movies12345
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data:/var/lib/neo4j/import   # CSVs accessible to LOAD CSV
      - ./schema:/schema:ro
      - ./queries:/queries:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  data-generator:
    build:
      context: ./data-generator
    container_name: movies_data_generator
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./schema:/app/schema:ro
      - ./queries:/app/queries:ro
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: movies12345
    # The generator container exits after producing CSVs and applying the schema.
    # Use `docker compose run --rm data-generator <cmd>` to run individual commands.
    command: ["python", "main.py", "--all"]

volumes:
  neo4j_data:
  neo4j_logs:
